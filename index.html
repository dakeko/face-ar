<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Face AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-face
      color-space="sRGB" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="character" src="assets/images/character.png" />
      </a-assets>
      <a-camera active="false" position="0 0 0"></a-camera>
      <a-entity mindar-face-target="anchorIndex: 1">
        <a-sphere color="green" radius="0.1"></a-sphere>
      </a-entity>
      <a-entity mindar-face-target="anchorIndex: 93">
        <a-image src="#character" position="0 0 0" scale="0.5 0.5 0.5" transparent="true"></a-image>
      </a-entity>
      <a-entity mindar-face-target="anchorIndex: 323">
        <a-image src="#character" position="0 0 0" scale="0.5 0.5 0.5" transparent="true"></a-image>
      </a-entity>
    </a-scene>
  </body>
</html>
